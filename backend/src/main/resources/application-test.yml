# =====================================================
#./gradlew test мӢң лҸҷмһ‘н•  DBм„Өм •(--spring.profiles.active=testмқј кІҪмҡ° лҸҷмһ‘н•ҳлҠ” м„Өм •)
# =====================================================
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_NO_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop        # мҡҙмҳҒ: validate (мҠӨнӮӨл§Ҳ мһҗлҸҷ ліҖкІҪ кёҲм§Җ)
    show-sql: false

